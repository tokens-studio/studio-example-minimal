name: "Test OIDC Auth"

on:
  workflow_dispatch:

jobs:
  test-oidc:
    runs-on: ubuntu-latest
    permissions:
      id-token: write    # Required for OIDC token
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Checkout studio CLI
        uses: actions/checkout@v4
        with:
          repository: The-Phoenix-Will-Fly/studio-cli
          ref: fix/ci-auth-security-hardening
          path: studio-cli

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'
          cache-dependency-path: studio-cli/go.sum

      - name: Build studio CLI
        run: cd studio-cli && go build -o "$GITHUB_WORKSPACE/studio" ./cmd/studio

      - name: Pull tokens via OIDC
        run: ./studio pull --ci
